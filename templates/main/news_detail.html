{% extends "base.html" %}

{% block title %}{{ news.title }}{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <!-- 面包屑导航 -->
            <nav aria-label="breadcrumb" class="mb-4">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/">首页</a></li>
                    <li class="breadcrumb-item"><a href="/elderly/news">资讯中心</a></li>
                    <li class="breadcrumb-item active" aria-current="page">{{ news.title }}</li>
                </ol>
            </nav>

            <!-- 文章内容 -->
            <article class="card border-0 shadow-sm">
                {% if news.cover_image %}
                <img src="{{ news.cover_image }}" class="card-img-top" alt="{{ news.title }}" style="max-height: 400px; object-fit: cover;">
                {% endif %}
                <div class="card-body p-4">
                    <h2 class="card-title mb-3">{{ news.title }}</h2>
                    <div class="text-muted mb-4 border-bottom pb-3">
                        <span class="me-3"><i class="bi bi-person me-1"></i>{{ news.author_name }}</span>
                        <span><i class="bi bi-calendar me-1"></i>{{ news.created_at }}</span>
                        <span class="badge bg-info ms-2">{{ news.news_type }}</span>
                    </div>
                    <div class="article-content" style="line-height: 1.8; font-size: 1.1rem;">
                        {{ news.content }}
                    </div>
                </div>
            </article>

            <!-- 返回按钮 -->
            <div class="mt-4 text-center">
                <button onclick="window.history.back()" class="btn btn-outline-primary">
                    <i class="bi bi-arrow-left me-1"></i>返回上一页
                </button>
            </div>
        </div>
    </div>
</div>
{% endblock %}
