{% extends "base.html" %}

{% block title %}添加用户{% endblock %}

{% block content %}
<div class="container-fluid p-0">
    <div class="row g-0 min-vh-100">
        <div class="col-md-2 sidebar py-4">
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='images/default_avatar.svg') }}" 
                     class="avatar-lg rounded-circle mb-2" alt="头像">
                <h5>{{ current_user.real_name }}</h5>
                <small class="text-muted">超级管理员</small>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="{{ url_for('super_admin.dashboard') }}">
                    <i class="bi bi-speedometer2"></i>数据概览
                </a>
                <a class="nav-link" href="{{ url_for('super_admin.communities') }}">
                    <i class="bi bi-building"></i>社区管理
                </a>
                <a class="nav-link active" href="{{ url_for('super_admin.users') }}">
                    <i class="bi bi-people"></i>用户管理
                </a>
                <a class="nav-link" href="{{ url_for('super_admin.service_categories') }}">
                    <i class="bi bi-list-ul"></i>服务类别
                </a>
                <a class="nav-link" href="{{ url_for('super_admin.content_management') }}">
                    <i class="bi bi-megaphone"></i>公告与资讯
                </a>
                <a class="nav-link" href="{{ url_for('super_admin.point_products') }}">
                    <i class="bi bi-gift"></i>积分商品
                </a>
                <a class="nav-link" href="{{ url_for('super_admin.alert_rules') }}">
                    <i class="bi bi-bell"></i>预警规则
                </a>
                <a class="nav-link" href="{{ url_for('super_admin.logs') }}">
                    <i class="bi bi-journal-text"></i>系统日志
                </a>
                <a class="nav-link" href="{{ url_for('super_admin.reports') }}">
                    <i class="bi bi-file-earmark-bar-graph"></i>数据报表
                </a>
            </nav>
        </div>
        <div class="col-md-10 py-4 px-5 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4><i class="bi bi-people text-primary me-2"></i>添加用户</h4>
                <a href="{{ url_for('super_admin.users') }}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>返回列表
                </a>
            </div>
            
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">用户名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="username" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">姓名 <span class="text-danger">*</span></label>
                                <input type="text" class="form-control" name="real_name" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">手机号</label>
                                <input type="text" class="form-control" name="phone">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">邮箱</label>
                                <input type="email" class="form-control" name="email">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">角色 <span class="text-danger">*</span></label>
                                <select class="form-select" name="role_id" required>
                                    <option value="">请选择角色</option>
                                    {% for role in roles %}
                                    <option value="{{ role.id }}">{{ role.description or role.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">所属社区</label>
                                <select class="form-select" name="community_id">
                                    <option value="">请选择社区</option>
                                    {% for community in communities %}
                                    <option value="{{ community.id }}">{{ community.name }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">初始密码</label>
                            <input type="password" class="form-control" name="password" value="123456">
                            <small class="text-muted">默认密码为 123456</small>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>保存
                            </button>
                            <a href="{{ url_for('super_admin.users') }}" class="btn btn-outline-secondary">取消</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
