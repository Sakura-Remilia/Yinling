{% extends "base.html" %}

{% block title %}编辑用药提醒{% endblock %}

{% block content %}
<div class="container-fluid p-0">
    <div class="row g-0 min-vh-100 elderly-layout">
        <div class="col-md-2 sidebar py-4">
            {% include "elderly/_sidebar.html" %}
        </div>
        <div class="col-md-10 py-4 px-5 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4><i class="bi bi-capsule me-2"></i>编辑用药提醒</h4>
            </div>
            
            <div class="row">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-body">
                            <form method="POST" action="{{ url_for('elderly.edit_medication', reminder_id=reminder.id) }}">
                                <div class="mb-3">
                                    <label class="form-label">药品名称 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="medication_name" value="{{ reminder.medication_name }}" required placeholder="如：降压药">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">剂量</label>
                                    <input type="text" class="form-control" name="dosage" value="{{ reminder.dosage or '' }}" placeholder="如：1片">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">服用频率</label>
                                    <select class="form-select" name="frequency">
                                        <option value="每天一次" {{ 'selected' if reminder.frequency == '每天一次' else '' }}>每天一次</option>
                                        <option value="每天两次" {{ 'selected' if reminder.frequency == '每天两次' else '' }}>每天两次</option>
                                        <option value="每天三次" {{ 'selected' if reminder.frequency == '每天三次' else '' }}>每天三次</option>
                                        <option value="每周一次" {{ 'selected' if reminder.frequency == '每周一次' else '' }}>每周一次</option>
                                        <option value="按需服用" {{ 'selected' if reminder.frequency == '按需服用' else '' }}>按需服用</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">提醒时间</label>
                                    <input type="text" class="form-control" name="reminder_times" value="{{ reminder.reminder_times or '' }}" placeholder="如：08:00, 12:00, 18:00">
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">备注</label>
                                    <textarea class="form-control" name="notes" rows="2" placeholder="其他注意事项">{{ reminder.notes or '' }}</textarea>
                                </div>
                                <div class="d-flex gap-2">
                                    <button type="submit" class="btn btn-primary">
                                        <i class="bi bi-check-lg me-1"></i>保存修改
                                    </button>
                                    <a href="{{ url_for('elderly.medication') }}" class="btn btn-secondary">
                                        <i class="bi bi-x-lg me-1"></i>取消
                                    </a>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
