{% extends "base.html" %}

{% block title %}个人资料{% endblock %}

{% block content %}
<div class="container-fluid p-0">
    <div class="row g-0 min-vh-100 elderly-layout">
        <div class="col-md-2 sidebar py-4">
            {% include "elderly/_sidebar.html" %}
        </div>
        <div class="col-md-10 py-4 px-5 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4><i class="bi bi-person me-2"></i>个人资料</h4>
            </div>
            
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">真实姓名</label>
                                <input type="text" class="form-control" value="{{ current_user.real_name }}" disabled>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">手机号</label>
                                <input type="text" class="form-control" value="{{ current_user.phone }}" disabled>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        <h5 class="mb-3">基本信息</h5>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">出生日期</label>
                                <input type="date" class="form-control" name="birth_date" 
                                       value="{{ profile.birth_date.strftime('%Y-%m-%d') if profile.birth_date else '' }}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">性别</label>
                                <select class="form-select" name="gender">
                                    <option value="">请选择</option>
                                    <option value="male" {{ 'selected' if profile.gender == 'male' }}>男</option>
                                    <option value="female" {{ 'selected' if profile.gender == 'female' }}>女</option>
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">身份证号</label>
                                <input type="text" class="form-control" name="id_card" 
                                       value="{{ profile.id_card or '' }}" maxlength="18">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">居住地址</label>
                                <input type="text" class="form-control" name="address" 
                                       value="{{ profile.address or '' }}">
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        <h5 class="mb-3">紧急联系人</h5>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label">紧急联系人1</label>
                                <input type="text" class="form-control" name="emergency_contact" 
                                       value="{{ profile.emergency_contact or '' }}" placeholder="姓名">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">联系电话1</label>
                                <input type="text" class="form-control" name="emergency_phone" 
                                       value="{{ profile.emergency_phone or '' }}" placeholder="手机号">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">紧急联系人2</label>
                                <input type="text" class="form-control" name="emergency_contact2" 
                                       value="{{ profile.emergency_contact2 or '' }}" placeholder="姓名">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">联系电话2</label>
                                <input type="text" class="form-control" name="emergency_phone2" 
                                       value="{{ profile.emergency_phone2 or '' }}" placeholder="手机号">
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        <h5 class="mb-3">健康信息</h5>
                        
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <label class="form-label">健康状况</label>
                                <textarea class="form-control" name="health_status" rows="2"
                                          placeholder="请描述您的整体健康状况">{{ profile.health_status or '' }}</textarea>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">慢性疾病</label>
                                <input type="text" class="form-control" name="chronic_diseases" 
                                       value="{{ profile.chronic_diseases or '' }}" placeholder="如：高血压、糖尿病等">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label">过敏史</label>
                                <input type="text" class="form-control" name="allergies" 
                                       value="{{ profile.allergies or '' }}" placeholder="如：青霉素过敏等">
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">病史记录</label>
                                <textarea class="form-control" name="medical_history" rows="2"
                                          placeholder="过往病史记录">{{ profile.medical_history or '' }}</textarea>
                            </div>
                        </div>
                        
                        <hr class="my-4">
                        <h5 class="mb-3">其他信息</h5>
                        
                        <div class="row">
                            <div class="col-md-12 mb-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" name="is_living_alone" 
                                           id="is_living_alone" {{ 'checked' if profile.is_living_alone }}>
                                    <label class="form-check-label" for="is_living_alone">
                                        独居老人
                                    </label>
                                </div>
                            </div>
                            <div class="col-md-12 mb-3">
                                <label class="form-label">子女信息</label>
                                <textarea class="form-control" name="children_info" rows="2"
                                          placeholder="子女姓名、联系方式等">{{ profile.children_info or '' }}</textarea>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{{ url_for('elderly.dashboard') }}" class="btn btn-outline-secondary">返回</a>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>保存修改
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
