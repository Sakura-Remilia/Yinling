{% extends "base.html" %}

{% block title %}个人设置{% endblock %}

{% block content %}
<div class="container-fluid p-0">
    <div class="row g-0 min-vh-100">
        <div class="col-md-2 sidebar py-4">
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='images/default_avatar.svg') }}" 
                     class="avatar-lg rounded-circle mb-2" alt="头像">
                <h5>{{ current_user.real_name }}</h5>
                <small class="text-muted">社区管理员</small>
            </div>
            <nav class="nav flex-column">
                <a class="nav-link" href="{{ url_for('community_admin.dashboard') }}">
                    <i class="bi bi-speedometer2"></i>数据看板
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.elderly_list') }}">
                    <i class="bi bi-people"></i>老人管理
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.volunteers') }}">
                    <i class="bi bi-person-heart"></i>志愿者管理
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.workers') }}">
                    <i class="bi bi-person-badge"></i>工作人员管理
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.orders') }}">
                    <i class="bi bi-list-check"></i>订单管理
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.sos_list') }}">
                    <i class="bi bi-exclamation-triangle"></i>SOS管理
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.activities') }}">
                    <i class="bi bi-calendar-event"></i>活动管理
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.accounts') }}">
                    <i class="bi bi-person-gear"></i>账号管理
                </a>
                <a class="nav-link" href="{{ url_for('community_admin.alerts') }}">
                    <i class="bi bi-bell"></i>预警通知
                </a>
                <a class="nav-link active" href="{{ url_for('community_admin.profile') }}">
                    <i class="bi bi-person"></i>个人设置
                </a>
            </nav>
        </div>
        <div class="col-md-10 py-4 px-5 main-content">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h4><i class="bi bi-person text-primary me-2"></i>个人设置</h4>
            </div>
            
            <div class="row g-4">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body text-center">
                            <img src="{{ url_for('static', filename='images/default_avatar.svg') }}" 
                                 class="avatar-lg rounded-circle mb-3" alt="头像">
                            <h4>{{ current_user.real_name }}</h4>
                            <p class="text-muted">{{ current_user.username }}</p>
                            <span class="badge bg-primary">社区管理员</span>
                        </div>
                    </div>
                </div>
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header">
                            <h5 class="mb-0">基本信息</h5>
                        </div>
                        <div class="card-body">
                            <form method="POST">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">用户名</label>
                                        <input type="text" class="form-control" value="{{ current_user.username }}" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">真实姓名</label>
                                        <input type="text" class="form-control" value="{{ current_user.real_name }}" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">电话</label>
                                        <input type="text" class="form-control" value="{{ current_user.phone or '未填写' }}" disabled>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">邮箱</label>
                                        <input type="email" class="form-control" value="{{ current_user.email or '未填写' }}" disabled>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                    
                    <div class="card mt-4">
                        <div class="card-header">
                            <h5 class="mb-0">工作信息</h5>
                        </div>
                        <div class="card-body">
                            <form method="POST">
                                <div class="row g-3">
                                    <div class="col-md-6">
                                        <label class="form-label">职位</label>
                                        <input type="text" class="form-control" name="position" 
                                               value="{{ profile.position if profile else '' }}">
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">部门</label>
                                        <input type="text" class="form-control" name="department" 
                                               value="{{ profile.department if profile else '' }}">
                                    </div>
                                    <div class="col-12">
                                        <button type="submit" class="btn btn-primary">
                                            <i class="bi bi-check-circle me-1"></i>保存修改
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
